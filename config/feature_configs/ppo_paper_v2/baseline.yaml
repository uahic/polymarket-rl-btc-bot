# Baseline configuration (22 market features, no time-of-day)
# This matches current production behavior

name: "baseline"
description: "Baseline PPO configuration with 22 market features"

# Feature selection
features:
  input_mode: "auto_adjust"  # auto_adjust | zero_fill

  # Individual feature toggles (grouped for readability)
  momentum:
    returns_1m: true
    returns_5m: true
    returns_10m: true

  order_flow:
    ob_imbalance_l1: true
    ob_imbalance_l5: true
    trade_flow: true
    cvd_accel: true

  microstructure:
    spread_pct: true
    trade_intensity: true
    large_trade_flag: true

  volatility:
    realized_vol_5m: true
    vol_expansion: true

  position:
    has_position: true
    position_side: true
    unrealized_pnl: true
    time_remaining: true

  regime:
    vol_regime: true
    trend_regime: true

  transaction:
    pending_order: true
    failed_order: true
    consecutive_failures: true

  capital:
    available_balance: true

  time_of_day:
    hour_sin: false
    hour_cos: false
    dow_sin: false
    dow_cos: false

# Model architecture
model:
  hidden_size: 64          # Actor hidden layer size
  critic_hidden_size: 96   # Critic hidden layer size (asymmetric)
  history_len: 5           # Temporal history length
  temporal_dim: 32         # GRU output dimension

# Training hyperparameters
training:
  lr_actor: 1.0e-4
  lr_critic: 3.0e-4
  gamma: 0.9
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.03
  value_coef: 0.5
  max_grad_norm: 0.5
  buffer_size: 2048
  batch_size: 64
  n_epochs: 10
  target_kl: 0.02

# Expected dimensions (for validation)
expected_input_dim: 25  # 22 market + 3 action
